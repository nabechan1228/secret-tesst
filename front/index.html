<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellaris - Professional Interactive Planetarium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-grad-start: #020208;
        --bg-grad-end: #07091e;
        --panel-bg: rgba(8, 10, 24, 0.65);
        --panel-border: rgba(100, 180, 255, 0.15);
        --text-primary: #f0f4ff;
        --text-secondary: #8da2cf;
        --accent-blue: #00bcd4;
        --accent-glow: rgba(0, 188, 212, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', 'Noto Sans JP', sans-serif;
        background: radial-gradient(circle at center, var(--bg-grad-end) 0%, var(--bg-grad-start) 100%);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
      }

      /* メインの描画コンテナ */
      #app-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        background: radial-gradient(circle at center, #050616 0%, #010103 100%);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(10, 15, 40, 0.5);
        border-radius: 50%;
        max-width: 95vmin;
        max-height: 95vmin;
        aspect-ratio: 1 / 1;
        cursor: grab;
      }

      canvas:active {
        cursor: grabbing;
      }

      /* 半透明コントロールパネル (Glassmorphism) */
      .control-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 320px;
        background: var(--panel-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 20px;
        transition: opacity 0.3s;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: #ffffff;
        background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        border-bottom: 1px solid var(--panel-border);
        padding-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      h1 span {
        font-size: 0.8rem;
        font-weight: 300;
        letter-spacing: 1px;
        color: var(--accent-blue);
        text-shadow: 0 0 8px var(--accent-glow);
      }

      .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        font-weight: 600;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .control-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      label {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      input[type="text"], input[type="number"], select {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        color: var(--text-primary);
        padding: 6px 10px;
        font-family: inherit;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.2s;
        width: 100px;
        text-align: right;
      }

      input[type="text"]:focus, input[type="number"]:focus, select:focus {
        border-color: var(--accent-blue);
      }

      select {
        text-align: left;
        width: 100%;
      }

      /* スライダーデザイン */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent-blue);
        box-shadow: 0 0 10px var(--accent-glow);
        cursor: pointer;
        transition: transform 0.1s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      /* スイッチデザイン */
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 22px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(255, 255, 255, 0.1);
        transition: .4s;
        border-radius: 22px;
        border: 1px solid var(--panel-border);
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: #fff;
        transition: .4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--accent-blue);
        box-shadow: 0 0 10px var(--accent-glow);
      }

      input:checked + .slider:before {
        transform: translateX(22px);
      }

      /* 座標表示盤 */
      .stats-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: var(--panel-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px 20px;
        font-family: monospace;
        font-size: 0.8rem;
        color: var(--text-secondary);
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 280px;
        pointer-events: none;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
      }

      .stat-val {
        color: var(--accent-blue);
      }

      /* 地平座標方位ラベル */
      .nav-hint {
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: var(--text-secondary);
        font-size: 0.8rem;
        background: var(--panel-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 8px 16px;
        pointer-events: none;
      }

      /* 操作ヒントアニメーション用 */
      .toast {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid var(--accent-blue);
        color: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 0.85rem;
        box-shadow: 0 0 15px var(--accent-glow);
        pointer-events: none;
        animation: fadeOut 4s forwards;
      }

      @keyframes fadeOut {
        0% { opacity: 0; transform: translateY(-10px); }
        10% { opacity: 1; transform: translateY(0); }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <!-- すりガラス調コントロールパネル -->
      <div class="control-panel">
        <h1>STELLARIS <span>PLANETARIUM</span></h1>
        
        <!-- 観測地点プリセット -->
        <div class="control-group">
          <div class="section-title">Observation Site</div>
          <div class="control-row">
            <label for="site-preset">Preset Location</label>
            <select id="site-preset">
              <option value="tokyo" selected>Tokyo, JP (35.7°N)</option>
              <option value="sydney">Sydney, AU (33.9°S)</option>
              <option value="northpole">North Pole (90.0°N)</option>
              <option value="equator">Equator (0.0°N)</option>
            </select>
          </div>
          <div class="control-row">
            <label for="input-lat">Latitude (°)</label>
            <input type="number" id="input-lat" step="0.1" min="-90" max="90" value="35.68">
          </div>
          <div class="control-row">
            <label for="input-lng">Longitude (°)</label>
            <input type="number" id="input-lng" step="0.1" min="-180" max="180" value="139.76">
          </div>
        </div>

        <!-- 時間コントロール -->
        <div class="control-group">
          <div class="section-title">Time Controls</div>
          <div class="control-row">
            <label for="input-date">Date & Time</label>
            <input type="text" id="input-date" style="width: 170px;" placeholder="YYYY-MM-DD HH:MM:SS">
          </div>
          <div class="control-row">
            <label for="toggle-time-flow">Real-time Movement</label>
            <label class="switch">
              <input type="checkbox" id="toggle-time-flow" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="control-row">
            <label for="time-speed">Time Acceleration</label>
            <span id="speed-label" style="font-size:0.8rem;color:var(--accent-blue);">1x</span>
          </div>
          <input type="range" id="time-speed" min="1" max="1000" value="1" step="1">
        </div>

        <!-- 描画トグル -->
        <div class="control-group">
          <div class="section-title">Display Settings</div>
          <div class="control-row">
            <label for="toggle-constellations">Constellation Lines</label>
            <label class="switch">
              <input type="checkbox" id="toggle-constellations" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="control-row">
            <label for="toggle-asterisms">Major Asterisms</label>
            <label class="switch">
              <input type="checkbox" id="toggle-asterisms" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="control-row">
            <label for="toggle-star-names">Star Names</label>
            <label class="switch">
              <input type="checkbox" id="toggle-star-names" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- プラネタリウム・円形ドームCanvas -->
      <canvas id="skyCanvas" width="800" height="800"></canvas>

      <!-- リアルタイム数値盤 -->
      <div class="stats-panel">
        <div class="stat-item"><span>Julian Date:</span><span id="stat-jd" class="stat-val">-</span></div>
        <div class="stat-item"><span>Local Sidereal:</span><span id="stat-lst" class="stat-val">-</span></div>
        <div class="stat-item"><span>View Center (Az/Alt):</span><span id="stat-view" class="stat-val">0° / 90°</span></div>
        <div class="stat-item"><span>Zoom Scale:</span><span id="stat-zoom" class="stat-val">100%</span></div>
      </div>

      <!-- 操作ヒント -->
      <div class="nav-hint">Drag: Rotate Sky | Wheel: Zoom In/Out</div>
      <div class="toast">STELLARIS API Connected successfully. Ready to explore.</div>
    </div>

    <!-- TypeScriptエントリースクリプトのロード -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
